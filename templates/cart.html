<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/CSS/main-page/style.css"/>
    <title>BestPizza</title>
</head>
<body>
<div class="header">
    <div class="header__icon">
        <img class="icon" src="../static/images/Vecto.png">
    </div>
    <div class="header__menu">
        <div class="header__menu-items">
            <a href="">MENU</a>
            <a href="">HOME</a>
            <a href="">CART</a>
            <a href="">LOGIN</a>
        </div>
    </div>
</div>

<div class="page-cart">
    <div class="cart">
        <div class="cart__header">
            <div class="section-header-name">
            <span>CART</span>
                </div>
            <div class="cart__header__component">
            <div class="select-currency">
                <select>
                    <option value="1">Euro</option>
                    <option value="2">Dollar</option>
                </select>
            </div>
            </div>
        </div>
        <div class="cart__item">
            <div class="cart__item__component item-icon">
                <img  src="../static/images/pizza-icon.png">
            </div>
            <div class="cart__item__component item-text-box">
                <div class="item-text">
                    <div class="name">Margarita</div>
                    <div class="description">small</div>
                </div>
            </div>
            <div class="cart__item__component item-counter">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
            <div class="cart__item__component item-cost">69420</div>
            <div class="cart__item__component item-clear">
                <button>bin</button>
            </div>
        </div>
        <div class="cart__item">
            <div class="cart__item__component item-icon">
                <img  src="../static/images/pizza-icon.png">
            </div>
            <div class="cart__item__component item-text-box">
                <div class="item-text">
                    <div class="name">Margarita</div>
                    <div class="description">small</div>
                </div>
            </div>
            <div class="cart__item__component item-counter">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
            <div class="cart__item__component item-cost">69420</div>
            <div class="cart__item__component item-clear">
                <button>bin</button>
            </div>
        </div>
        <div class="cart__total">
            <span class="section-header-name">Total</span>
            <div class="total-sum">
                <span class="text">200000000000</span>
                <div class="currency-sign">$</div>
            </div>

        </div>
        <div class="get-delivery-button">
            <button >Process Delivery</button>
        </div>
        <div class="delivery-info">
            <input class="delivery-info__address" type="text">
            <input class="delivery-info__name" type="text">
            <input class="delivery-info__entrance" type="text">
            <input class="delivery-info__floor" type="text">
            <input class="delivery-info__apartment" type="text">
            <input class="delivery-info__phone" type="tel">
            <input class="delivery-info__email" type="email">

        </div>
    </div>

</div>


<div class="bottom">
<div class="footer">
    <div class="footer__logo">
        <img src="../static/images/foot-logo.png">
    </div>
    <div class="footer__link">
        <div class="footer__link__text">Follow us on social media</div>
        <div class="footer__link__icons">
            <img src="../static/images/Twitter.png">
            <img src="../static/images/Instagram.png">
            <img src="../static/images/Facebook.png">
            <img src="../static/images/WhatsApp.png">
        </div>
    </div>
</div>
<div class="page-bottom"></div>
</div>


<script>
    var x, i, j, l, ll, selElmnt, a, b, c;
    /* Look for any elements with the class "custom-select": */
    x = document.getElementsByClassName("select-currency");
    l = x.length;
    for (i = 0; i < l; i++) {
        selElmnt = x[i].getElementsByTagName("select")[0];
        ll = selElmnt.length;
        /* For each element, create a new DIV that will act as the selected item: */
        a = document.createElement("DIV");
        a.setAttribute("class", "select-selected");
        a.innerHTML = selElmnt.options[selElmnt.selectedIndex].innerHTML;
        x[i].appendChild(a);
        /* For each element, create a new DIV that will contain the option list: */
        b = document.createElement("DIV");
        b.setAttribute("class", "select-items select-hide");
        for (j = 0; j < ll; j++) {
            /* For each option in the original select element,
            create a new DIV that will act as an option item: */
            c = document.createElement("DIV");
            c.innerHTML = selElmnt.options[j].innerHTML;
            c.addEventListener("click", function(e) {
                /* When an item is clicked, update the original select box,
                and the selected item: */
                let y, i, k, s, h, sl, yl;
                s = this.parentNode.parentNode.getElementsByTagName("select")[0];
                sl = s.length;
                h = this.parentNode.previousSibling;
                for (i = 0; i < sl; i++) {
                    if (s.options[i].innerHTML === this.innerHTML) {
                        s.selectedIndex = i;
                        h.innerHTML = this.innerHTML;
                        y = this.parentNode.getElementsByClassName("same-as-selected");
                        yl = y.length;
                        for (k = 0; k < yl; k++) {
                            y[k].removeAttribute("class");
                        }
                        this.setAttribute("class", "same-as-selected");
                        break;
                    }
                }
                h.click();
            });
            b.appendChild(c);
        }
        x[i].appendChild(b);
        a.addEventListener("click", function(e) {
            /* When the select box is clicked, close any other select boxes,
            and open/close the current select box: */
            e.stopPropagation();
            closeAllSelect(this);
            this.nextSibling.classList.toggle("select-hide");
            this.classList.toggle("select-arrow-active");
        });
    }

    function closeAllSelect(elmnt) {
        /* A function that will close all select boxes in the document,
        except the current select box: */
        var x, y, i, xl, yl, arrNo = [];
        x = document.getElementsByClassName("select-items");
        y = document.getElementsByClassName("select-selected");
        xl = x.length;
        yl = y.length;
        for (i = 0; i < yl; i++) {
            if (elmnt === y[i]) {
                arrNo.push(i)
            } else {
                y[i].classList.remove("select-arrow-active");
            }
        }
        for (i = 0; i < xl; i++) {
            if (arrNo.indexOf(i)) {
                x[i].classList.add("select-hide");
            }
        }
    }

    /* If the user clicks anywhere outside the select box,
    then close all select boxes: */
    document.addEventListener("click", closeAllSelect);
</script>
</body>


</html>
