<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/CSS/main-page/style.css"/>
    <title>BestPizza</title>
</head>
<body>
<div class="header">
        <div class="header__icon">
            <img class="icon" src="../static/images/Vecto.png">
        </div>
        <div class="header__menu">
            <div class="header__menu-items">
                <a href="">MENU</a>
                <a href="">HOME</a>
                <a href="">CART</a>
                <a href="">LOGIN</a>
            </div>
        </div>
</div>
<div class="page-main">
    <div class="promo">
        <div >
            <!--<img src="../static/images/pl.png">-->
            <img class="promo__image" src="../static/images/Sandwich.png">
        </div>
        <div class="promo__text">
            <div class="promo__text time">
                SALE 18:00 - 21:00
            </div>
            <div class="promo__text percent">
                50%
            </div>
            <div class="promo__text condition">
                for the second pizza
            </div>
        </div>
    </div>
    <div class="special-offer">
        <div class="special-offer__text">
            <div class="percent">2X1</div>
            <div class="type">PEPPERONI</div>
        </div>
        <img class="special-offer__image" src="../static/images/special.png">
    </div>
    <div class="delivery">
        <img class="delivery__image" src="../static/images/delivery.png">
        <div class="delivery__text">
            <div class="service-name">
                <div>DELIVERY</div>
                <div>SERVICE</div>
            </div>
            <div class="service-time">
                <div>EVERYDAY</div>
                <DIV>12:00 - 23:00</DIV>
                <DIV>FREE DELIVERY</DIV>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="footer__logo">
        <img src="../static/images/foot-logo.png">
    </div>
    <div class="footer__link">
        <div class="footer__link__text">Follow us on social media</div>
        <div class="footer__link__icons">
            <img src="../static/images/Twitter.png">
            <img src="../static/images/Instagram.png">
            <img src="../static/images/Facebook.png">
            <img src="../static/images/WhatsApp.png">
        </div>
    </div>
</div>
<div class="page-bottom"></div>

</body>
</html>
